<div class="form-container">
  <h2>Add Attendance</h2>

  <form [formGroup]="attendanceForm" (ngSubmit)="addAttendance()">

    <!-- Employee ID -->
    <div class="form-group">
      <label>Employee ID</label>
      <input formControlName="employee_id" placeholder="Employee ID" />
      <div class="error" *ngIf="attendanceForm.get('employee_id')?.touched && attendanceForm.get('employee_id')?.invalid">
        Employee ID is required
      </div>
    </div>

    <!-- Date -->
    <div class="form-group">
      <label>Date</label>
      <input type="date" formControlName="date" />
      <div class="error" *ngIf="attendanceForm.get('date')?.touched && attendanceForm.get('date')?.invalid">
        Date is required
      </div>
    </div>

    <!-- Status -->
    <div class="form-group">
      <label>Status</label>
      <select formControlName="status">
        <option value="">Select Status</option>
        <option value="Present">Present</option>
        <option value="Absent">Absent</option>
      </select>
      <div class="error" *ngIf="attendanceForm.get('status')?.touched && attendanceForm.get('status')?.invalid">
        Status is required
      </div>
    </div>

    <button type="submit" [disabled]="attendanceForm.invalid">Add Attendance</button>
  </form>
</div>
